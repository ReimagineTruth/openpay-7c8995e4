<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background matching OpenPay brand -->
  <rect width="256" height="256" rx="32" fill="#003087"/>
  <rect x="16" y="16" width="224" height="224" rx="28" fill="#0040A6"/>
  
  <!-- OpenPay-style circular logo -->
  <circle cx="128" cy="110" r="45" fill="#009CDE"/>
  <circle cx="128" cy="110" r="35" fill="#00B4E6"/>
  <circle cx="128" cy="110" r="25" fill="#00CFFF"/>
  
  <!-- OpenPay letters -->
  <text x="128" y="120" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">OP</text>
  
  <!-- OUSD ribbon/badge -->
  <path d="M 64 160 L 192 160 L 184 190 Q 128 200 72 190 Z" fill="#FFD700"/>
  <text x="128" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#003087">OUSD</text>
  
  <!-- Dollar symbol indicator -->
  <circle cx="200" cy="60" r="12" fill="#00C853"/>
  <text x="200" y="66" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">$</text>
</svg>
