  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Suppress Pi SDK postMessage errors when running outside Pi Browser
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('postMessage') && e.message.includes('minepi.com')) {
          console.info('Pi SDK postMessage error suppressed (expected outside Pi Browser)');
          e.preventDefault();
          return false;
        }
      });
      
      (function () {
        if (window.__PI_SDK_LOADING__) return;
        window.__PI_SDK_LOADING__ = true;

        var host = window.location.hostname || "";
        var isLocal =
          host === "localhost" ||
          host === "127.0.0.1" ||
          host.endsWith(".local") ||
          host.endsWith(".test");

        var script = document.createElement("script");
        script.src = "https://sdk.minepi.com/pi-sdk.js";
        script.onload = function () {
          try {
            if (window.Pi && typeof window.Pi.init === "function") {
              var sandbox = isLocal;
              window.Pi.init({ version: "2.0", sandbox: sandbox });
            }
          } catch (e) {
            console.warn("Pi SDK init failed:", e);
            // Silently handle postMessage errors when not in Pi Browser
            if (e.message && e.message.includes('postMessage')) {
              console.info("Running outside Pi Browser - Pi SDK features unavailable");
            }
          }
          try {
            window.dispatchEvent(new Event("pi-sdk-ready"));
          } catch (e) {
            // ignore
          }
        };
        script.onerror = function () {
          try {
            window.dispatchEvent(new Event("pi-sdk-error"));
          } catch (e) {
            // ignore
          }
        };
        document.head.appendChild(script);
      })();
    </script>
